{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>newsdecklive – Create Account</title>
  <meta name="description" content="Create your newsdecklive account for personalized English & Malayalam news.">

  <!-- Styles -->
  <link rel="stylesheet" href="{% static 'css/login.css' %}">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* Show signup card on this standalone page */
    .auth-wrapper { }
    .auth-wrapper .card-face--front { opacity: 0; pointer-events: none; transform: translateY(-16px) scale(0.98); }
    .auth-wrapper .card-face--back { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
  </style>
</head>

<body>

<div class="auth-wrapper" id="authWrapper">

  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="particles" id="particles"></div>

  <div class="auth-container">

    <div class="brand">
      <div class="brand__icon">
        <i class="fa-solid fa-newspaper"></i>
      </div>
      <div class="brand__name">newsdecklive</div>
      <div class="brand__tagline">English & Malayalam News Aggregator</div>
    </div>

    <div class="card-flipper" id="cardFlipper">

      <!-- FRONT (hidden on this page) -->
      <div class="card-face card-face--front">
        <div class="card-header">
          <h1 class="card-header__title">Welcome Back</h1>
          <p class="card-header__subtitle">Sign in to continue</p>
        </div>
        <div class="switch-prompt">
          <a href="{% url 'login' %}" class="switch-prompt__link">Go to Sign In</a>
        </div>
      </div>

      <!-- BACK — SIGNUP (visible) -->
      <div class="card-face card-face--back">
        <div class="card-header">
          <h1 class="card-header__title">Create Account</h1>
          <p class="card-header__subtitle">Join newsdecklive for personalized news</p>
        </div>

        <form method="post" action="{% url 'register' %}" id="signupForm">
          {% csrf_token %}

          <div class="form-group">
            <i class="fa-solid fa-user form-group__icon"></i>
            <input type="text"
                   name="name"
                   id="signup-name"
                   class="form-group__input"
                   placeholder="Full Name"
                   autocomplete="name"
                   required>
          </div>

          <div class="form-group">
            <i class="fa-solid fa-envelope form-group__icon"></i>
            <input type="email"
                   name="email"
                   id="signup-email"
                   class="form-group__input"
                   placeholder="Email Address"
                   autocomplete="email"
                   required>
          </div>

          <div class="form-group">
            <i class="fa-solid fa-lock form-group__icon"></i>
            <input type="password"
                   name="password"
                   id="signup-password"
                   class="form-group__input"
                   placeholder="Password"
                   autocomplete="new-password"
                   required>
            <button type="button" class="form-group__toggle" data-target="signup-password" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="form-group">
            <i class="fa-solid fa-language form-group__icon"></i>
            <select name="language"
                    id="signup-language"
                    class="form-group__select"
                    required>
              <option value="" disabled selected hidden>Preferred Language</option>
              <option value="1">English</option>
              <option value="2">Malayalam</option>
            </select>
          </div>

          <button type="submit" class="btn-submit" id="signupBtn">
            Create Account
          </button>
        </form>

        <div class="divider">or</div>

        <div class="switch-prompt">
          Already have an account?
          <a href="{% url 'login' %}" class="switch-prompt__link">Sign In</a>
        </div>
      </div>

    </div>

    <div class="auth-footer">
      <span>© 2026 newsdecklive • All rights reserved</span>
    </div>

  </div>
</div>

<script src="{% static 'js/login.js' %}"></script>

</body>
</html>
