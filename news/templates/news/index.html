{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>newsdecklive – Login & Signup</title>

  <!-- Login Page Styles -->
  <link rel="stylesheet" href="{% static 'css/login.css' %}">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<div class="auth-wrapper">

    <!-- Background shapes -->
    <div class="background-shape"></div>
    <div class="secondary-shape"></div>

    <!-- =============================
         LOGIN PANEL
       ============================= -->
    <div class="credentials-panel signin">
        <h2 class="slide-element">Login</h2>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="field-wrapper slide-element">
                <input type="text" name="username" required>
                <label>Username</label>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="field-wrapper slide-element">
                <input type="password" name="password" required>
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="field-wrapper slide-element">
                <button type="submit" class="submit-button">Login</button>
            </div>

            <div class="switch-link slide-element">
                <p>Don't have an account?<br>
                    <a href="#" class="register-trigger">Sign Up</a>
                </p>
            </div>
        </form>
    </div>

    <!-- Login Welcome Panel -->
    <div class="welcome-section signin">
        <h2 class="slide-element">WELCOME BACK!</h2>
    </div>

    <!-- =============================
         SIGNUP PANEL
       ============================= -->
    <div class="credentials-panel signup">
        <h2 class="slide-element">Register</h2>

        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="field-wrapper slide-element">
                <input type="text" name="name" required>
                <label>Name</label>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="field-wrapper slide-element">
                <input type="email" name="email" required>
                <label>Email</label>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="field-wrapper slide-element">
                <input type="password" name="password" required>
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="field-wrapper slide-element">
                <select name="language" required
                        style="width:100%;background:transparent;border:none;border-bottom:2px solid #aaa;color:#fff;padding:10px 0;">
                    <option value="" disabled selected hidden>Select Language</option>
                    <option value="1" style="color:black;">English</option>
                    <option value="2" style="color:black;">Malayalam</option>
                </select>
                <label>Preferred Language</label>
                <i class="fa-solid fa-language"></i>
            </div>

            <div class="field-wrapper slide-element">
                <button type="submit" class="submit-button">Register</button>
            </div>

            <div class="switch-link slide-element">
                <p>Already have an account?<br>
                    <a href="#" class="login-trigger">Sign In</a>
                </p>
            </div>
        </form>
    </div>

    <!-- Signup Welcome Panel -->
    <div class="welcome-section signup">
        <h2 class="slide-element">WELCOME!</h2>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    <p>newsdecklive • English & Malayalam News Aggregator</p>
</div>

<!-- JavaScript -->
<script src="{% static 'js/login.js' %}"></script>

</body>
</html>
